name: Bug Report
description: File a report to help us improve PipeProxy
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How to reproduce it?
      description: Please provide the environment variables or steps to reproduce the issue.
      placeholder: |
        1. Start server with...
        2. Start client with...
        3. Run command...
    validations:
      required: true
  - type: dropdown
    id: node-version
    attributes:
      label: Node.js Version
      options:
        - v18.x
        - v20.x
        - v22.x
        - Other (please specify in logs)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Please copy and paste any relevant log output (SERVER_OUT/CLIENT_OUT).
      render: shell
